<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>清页</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app shell zara-app">
    <header class="zara-hero">
      <div class="topbar">
        <form class="searchbar" id="searchForm">
          <input id="searchInput" type="search" placeholder="搜索网页或直接输入网址" autocomplete="off">
          <button class="btn btn-small btn-primary" type="submit">搜索</button>
        </form>
        <nav class="quick-links" aria-label="常用入口">
          <button class="quick-link" data-url="https://www.google.com">Google</button>
          <button class="quick-link" data-url="https://github.com">GitHub</button>
          <button class="quick-link" data-url="https://www.youtube.com">YouTube</button>
          <button class="quick-link" data-url="chrome://bookmarks/">收藏夹</button>
        </nav>
      </div>
    </header>

    <section class="zara-toolbar">
      <div class="zara-section-title">当前标签</div>
      <div class="zara-toolbar-right">
        <span class="zara-meta" id="groupHint"></span>
        <button class="btn btn-small" id="refreshBtn">刷新</button>
        <button class="btn btn-small" id="saveSessionBtn">保存会话</button>
        <button class="btn btn-small" id="restoreSessionBtn">恢复会话</button>
        <button class="btn btn-small" id="closeDuplicatesBtn">去重</button>
        <button class="btn btn-small btn-danger-soft" id="closeAllBtn">全部关闭</button>
      </div>
    </section>

    <section class="zara-board-wrap">
      <section class="zara-board" id="groups"></section>
    </section>

    <section class="saved-strip panel saved-panel">
      <div class="panel-head saved-strip-head">
        <h2>稍后处理</h2>
        <div class="saved-strip-meta">
          <span id="savedHint"></span>
          <span class="saved-strip-count"><span id="savedCount">—</span> 条</span>
        </div>
      </div>
      <div id="savedList" class="saved-list saved-strip-list"></div>
      <div id="savedEmpty" class="empty">还没有保存的标签。现在还算清爽。</div>
    </section>
  </main>

  <template id="groupTemplate">
    <article class="group-card zara-group-card">
      <div class="group-top zara-group-top">
        <div class="group-heading">
          <div class="group-badge"></div>
          <div>
            <h3 class="group-title"></h3>
            <div class="group-meta"></div>
          </div>
        </div>
      </div>
      <div class="tab-list"></div>
      <div class="group-footer-actions">
        <button class="btn btn-small focus-group-btn">专注这个</button>
        <button class="btn btn-small close-group-btn">关闭这组</button>
      </div>
    </article>
  </template>

  <template id="tabTemplate">
    <div class="tab-item">
      <button class="tab-main">
        <div class="tab-row">
          <img class="tab-favicon" alt="">
          <div class="tab-text">
            <div class="tab-title"></div>
            <div class="tab-url"></div>
          </div>
        </div>
      </button>
      <div class="tab-actions">
        <button class="icon-btn save-btn" title="保存到稍后处理">稍后</button>
        <button class="icon-btn close-btn" title="关闭标签">关闭</button>
      </div>
    </div>
  </template>

  <template id="savedTemplate">
    <div class="saved-item">
      <a class="saved-link" target="_blank" rel="noreferrer noopener"></a>
      <div class="saved-actions">
        <button class="icon-btn reopen-btn">打开</button>
        <button class="icon-btn remove-saved-btn">移除</button>
      </div>
    </div>
  </template>

  <script src="app.js"></script>
</body>
</html>
